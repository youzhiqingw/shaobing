<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 烧饼小摊</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 头部 -->
  <header class="header">
    <div class="container">
      <h1 class="logo">🔥 烧饼小摊</h1>
      <nav class="nav">
        <a href="history.html" class="nav-link">📜 历史</a>
        <a href="login.html" class="nav-link">🔧 管理</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <!-- 图片轮播区 -->
      <section class="gallery-section">
        <div class="gallery">
          <div class="gallery-track" id="galleryTrack">
            <div class="gallery-item">
              <img src="images/shaobing-1.svg" alt="烧饼图片 1">
            </div>
            <div class="gallery-item">
              <img src="images/shaobing-2.svg" alt="烧饼图片 2">
            </div>
            <div class="gallery-item">
              <img src="images/shaobing-3.svg" alt="烧饼图片 3">
            </div>
          </div>
          <button class="gallery-btn gallery-prev" id="galleryPrev">◀</button>
          <button class="gallery-btn gallery-next" id="galleryNext">▶</button>
          <div class="gallery-dots" id="galleryDots"></div>
        </div>
      </section>

      <!-- 今日出摊信息 -->
      <section class="status-section">
        <div class="status-card" id="statusCard">
          <div class="status-header">
            <span class="status-badge" id="statusBadge">● 出摊中</span>
          </div>
          <div class="status-body">
            <div class="status-item">
              <span class="status-icon">📍</span>
              <span class="status-label">位置：</span>
              <span class="status-value" id="statusLocation">加载中...</span>
            </div>
            <div class="status-item">
              <span class="status-icon">⏰</span>
              <span class="status-label">时间：</span>
              <span class="status-value" id="statusTime">加载中...</span>
            </div>
            <div class="status-item">
              <span class="status-icon">📝</span>
              <span class="status-label">备注：</span>
              <span class="status-value" id="statusNote">加载中...</span>
            </div>
          </div>
          <div class="status-footer">
            <a href="login.html" class="edit-btn">✏️ 编辑</a>
          </div>
        </div>
      </section>

      <!-- 收款二维码 -->
      <section class="qr-section">
        <h2 class="section-title">收款码</h2>
        <div class="qr-container">
          <div class="qr-card">
            <img src="images/wechat-qr.svg" alt="微信支付">
            <p class="qr-label">微信支付</p>
          </div>
          <div class="qr-card">
            <img src="images/alipay-qr.svg" alt="支付宝支付">
            <p class="qr-label">支付宝支付</p>
          </div>
        </div>
      </section>

      <!-- 顾客评价 -->
      <section class="review-section">
        <div class="review-header">
          <h2 class="section-title">顾客评价 💬</h2>
          <a href="login.html" class="manage-link">管理</a>
        </div>
        
        <!-- 评价统计 -->
        <div class="review-stats">
          <div class="stat-item">
            <span class="stat-icon good">👍</span>
            <span class="stat-count" id="goodCount">0</span>
            <span class="stat-label">人</span>
            <span class="stat-percent" id="goodPercent">0%</span>
          </div>
          <div class="stat-item">
            <span class="stat-icon bad">👎</span>
            <span class="stat-count" id="badCount">0</span>
            <span class="stat-label">人</span>
            <span class="stat-percent" id="badPercent">0%</span>
          </div>
        </div>

        <!-- 评价按钮 -->
        <div class="review-actions">
          <button class="review-btn review-btn-good" id="btnGood">👍 好吃</button>
          <button class="review-btn review-btn-bad" id="btnBad">👎 不好吃</button>
        </div>

        <!-- 评价表单（隐藏） -->
        <div class="review-form-wrapper" id="reviewFormWrapper">
          <div class="review-form">
            <textarea 
              class="review-input" 
              id="reviewInput" 
              placeholder="说点什么吧...（可选，最多 100 字）"
              maxlength="100"
            ></textarea>
            <div class="review-form-actions">
              <button class="review-submit" id="reviewSubmit">提交</button>
              <button class="review-cancel" id="reviewCancel">取消</button>
            </div>
          </div>
        </div>

        <!-- 评价列表 -->
        <div class="review-list" id="reviewList">
          <!-- 评价项由 JS 动态生成 -->
        </div>

        <div class="review-more">
          <a href="login.html" class="more-link">查看更多</a>
        </div>
      </section>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 🔥 烧饼小摊</p>
    </div>
  </footer>

  <!-- 评价反馈弹窗 -->
  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
  <script src="js/review.js"></script>
</body>
</html>
